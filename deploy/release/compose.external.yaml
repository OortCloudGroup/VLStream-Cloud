name: vlstream-cloud

services:
  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/oortcloudgroup/vlstream-backend:1.0.0}
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8080
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_URL: ${EXTERNAL_MYSQL_URL:?请设置 EXTERNAL_MYSQL_URL}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_USERNAME: ${EXTERNAL_MYSQL_USERNAME:?请设置 EXTERNAL_MYSQL_USERNAME}
      SPRING_DATASOURCE_DYNAMIC_DATASOURCE_MASTER_PASSWORD: ${EXTERNAL_MYSQL_PASSWORD:?请设置 EXTERNAL_MYSQL_PASSWORD}
      SPRING_REDIS_HOST: ${EXTERNAL_REDIS_HOST:?请设置 EXTERNAL_REDIS_HOST}
      SPRING_REDIS_PORT: ${EXTERNAL_REDIS_PORT:-6379}
      SPRING_REDIS_PASSWORD: ${EXTERNAL_REDIS_PASSWORD:-}
      SPRING_BOOT_ADMIN_CLIENT_ENABLED: "false"
      XXL_JOB_ENABLED: "false"
      JAVA_OPTS: ${JAVA_OPTS:--Xms512m -Xmx2048m -Dfile.encoding=UTF-8}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-data:/app/data
      - backend-logs:/app/logs

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/oortcloudgroup/vlstream-frontend:1.0.0}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"

volumes:
  backend-data:
  backend-logs:
