name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "8"
          cache: maven
      - name: Build backend
        working-directory: VLStream-Cloud-Backend-Server/vls-stream
        run: mvn -ntp -Pprod -Dmaven.test.skip=true package
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: VLStream-Web/VLStream-ui/package-lock.json
      - name: Build frontend
        working-directory: VLStream-Web/VLStream-ui
        env:
          VITE_API_BASE_URL: /bus/vls-server
        run: npm ci && npm run build

  images:
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: VLStream-Cloud-Backend-Server/vls-stream
            dockerfile: VLStream-Cloud-Backend-Server/vls-stream/ruoyi-admin/Dockerfile.release
          - name: frontend
            context: VLStream-Web/VLStream-ui
            dockerfile: VLStream-Web/VLStream-ui/Dockerfile.release
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/oortcloudgroup/vlstream-${{ matrix.name }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  release:
    needs: images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build release archive
        run: bash scripts/release/build-release.sh "${GITHUB_REF_NAME#v}"
      - uses: softprops/action-gh-release@v3
        with:
          name: VLStream Cloud ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            codex/release-dist/VLStream-Cloud-${{ github.ref_name }}.zip
            codex/release-dist/VLStream-Cloud-${{ github.ref_name }}.zip.sha256
