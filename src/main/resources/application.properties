# 录制服务配置
recording.enabled=true
recording.default.duration=60
recording.default.quality=medium
recording.base.path=recordings
recording.max.concurrent=5

# 线程池配置
recording.thread.pool.core-size=5
recording.thread.pool.max-size=10
recording.thread.pool.queue-capacity=100
recording.thread.pool.keep-alive-seconds=60 