server:
  port: 18080
  address: 0.0.0.0  # Bind to all network interfaces
  tomcat:
    uri-encoding: UTF-8
    relaxed-query-chars: "|,{,},[,],\\"
    relaxed-path-chars: "|,{,},[,],\\"
    relaxed-uri-chars: "|,{,},[,],\\"
    relaxed-method-chars: "|,{,},[,],\\"
    max-http-form-post-size: 1024MB
    max-swallow-size: 1024MB
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
    multipart:
      enabled: true
      max-file-size: 1024MB
      max-request-size: 1024MB
spring:
  application:
    name: vls-server
  mvc:
    pathmatch:
      matching-strategy: ant-path-matcher
  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:./static/
        - file:./recordings/
  # Data source configuration
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:192.168.60.77}:${DB_PORT:32443}/vlstream?useSSL=false&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&transformedBitIsBoolean=true&serverTimezone=GMT%2B8&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:mysql@pass}
  # Redis configuration
  redis:
    host: ${REDIS_HOST:192.168.60.76}
    port: ${REDIS_PORT:32576}
    password: ${REDIS_PASSWORD:redis@pass}
#    host: localhost
#    port: 6379
#    password:
#    database: 0
    timeout: 5000ms
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        max-idle: 8
        min-idle: 0
        
  # Jackson configuration
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non-null
    
  # File upload configuration
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
      
# MyBatis Plus configuration
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    call-setters-on-nulls: true
    jdbc-type-for-null: 'null'
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  type-aliases-package: com.vlstream.server.entity

# Knife4j configuration
knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
    enable-document-manage: true
    swagger-model-name: Entity Class List
    enable-version: false
    enable-reload-cache-parameter: false
    enable-after-script: true
    enable-filter-multipart-api-method-type: POST
    enable-filter-multipart-apis: false
    enable-request-cache: true
    enable-host: false
    enable-host-text: 
    enable-home-custom: true
    home-custom-path: classpath:markdown/home.md
    enable-search: true
    enable-footer: false
    enable-footer-custom: true
    footer-custom-content: Apache License 2.0 | Copyright 2024 VLStream

# Logging configuration
logging:
  level:
    com.vlstream.server: debug
    org.springframework.web: info
    org.mybatis: debug
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
    file: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'
  file:
    name: logs/vlstream-server.log
    max-size: 50MB
    max-history: 30

# Business configuration
vlstream:
  ssh:
    host: 192.168.88.173
    port: 22
    username: oort
    password: oort301
  # Algorithm configuration
  algorithm:
    max-concurrent-tasks: 10
    timeout: 300000
    confidence-threshold: 0.8
    
  # Device configuration
  device:
    heartbeat-interval: 30000
    connection-timeout: 5000
    max-reconnect-times: 3 

    # Recording configuration
recording:
  storage:
    path: ./recordings
  enabled: true

# Stream conversion configuration
stream:
  # Preferred conversion mode (webrtc | hls)
  preferred-mode: webrtc
  
  # HLS output configuration
  hls:
    output-dir: static/hls/
    segment-time: 2
    list-size: 5
    delete-segments: true
  
  # FFmpeg configuration
  ffmpeg:
    path: ffmpeg
    timeout: 30000
    max-concurrent-streams: 5
  
  # Resource cleanup configuration
  cleanup:
    enabled: true
    interval: 3600000  # 1 hour
    max-idle-time: 600000  # 10 minutes idle auto cleanup

# WebRTC configuration
webrtc:
  streamer:
    # WebRTC-streamer server address
    url: http://webrtc-streamer-server.zglt-1742612481:8000
    internetUrl: http://oort.oortcloudsmart.com:21410/bus/webrtc-streamer-server
    # Whether to enable WebRTC function
    enabled: true
    # Connection timeout (milliseconds)
    timeout: 30000
    # Retry count
    retry-count: 3
    # STUN server configuration
    stun-server: stun.l.google.com:19302
    # Whether to enable logging
    verbose: true

# Unified user center configuration
