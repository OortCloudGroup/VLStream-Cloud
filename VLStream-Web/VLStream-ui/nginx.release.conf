server {
    listen 80;
    server_name _;
    client_max_body_size 1024m;

    location = / {
        return 302 /bus/vls-ui/;
    }

    location /bus/vls-ui/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /bus/vls-ui/index.html;
    }

    location = /bus/vls-server {
        return 308 /bus/vls-server/;
    }

    location /bus/vls-server/ {
        proxy_pass http://backend:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location = /bus/webrtc-streamer-server {
        return 308 /bus/webrtc-streamer-server/;
    }

    location /bus/webrtc-streamer-server/ {
        proxy_pass http://webrtc-streamer:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

