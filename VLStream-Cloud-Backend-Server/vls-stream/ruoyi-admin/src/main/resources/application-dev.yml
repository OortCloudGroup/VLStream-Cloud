          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_PASSWORD:mysql@pass}
#          url: jdbc:mysql://${MYSQL_HOST:192.168.50.13}:${MYSQL_PORT:32426}/${MYSQL_DB_NAME:apaas_workflowforms}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
