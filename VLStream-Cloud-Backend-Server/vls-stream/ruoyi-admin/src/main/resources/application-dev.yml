#          url: jdbc:mysql://${MYSQL_HOST:192.168.60.77}:${MYSQL_PORT:32443}/${MYSQL_DB_NAME:test2}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8&autoReconnect=true&rewriteBatchedStatements=true&nullCatalogMeansCurrent=true
#          username: ${MYSQL_USERNAME:root}
