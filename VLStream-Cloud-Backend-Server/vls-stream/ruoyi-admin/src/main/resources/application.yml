# security配置
security:
  # 排除路径
  excludes:
    # 静态资源
    - /*.html
    - /**/*.html
    - /**/*.css
    - /**/*.js
    # 公共路径
    - /favicon.ico
    - /error
    # swagger 文档配置
    - /*/api-docs
    - /*/api-docs/**
    # actuator 监控配置
    - /actuator
    - /actuator/**
    - /logout
    - /blade-auth/token
    - /blade-auth/logout
    - /captchaImage
    - /login
    # 主动安全设备上报接口沿用 Go 服务的公开调用约定
    - /task/v1/event_report_camera
    - /task/v1/event_report_cameras
    - /monitor/**
#    - /xxl-job-admin/**

# MyBatisPlus配置
# https://baomidou.com/config/
mybatis-plus:
  # 不支持多包, 如有需要可在注解配置 或 提升扫包等级
  # 例如 com.**.**.mapper
  mapperPackage: com.ruoyi.**.mapper
  # 对应的 XML 文件位置
  mapperLocations: classpath*:mapper/**/*Mapper.xml
  # 实体扫描，多个package用逗号或者分号分隔
  typeAliasesPackage: com.ruoyi.**.domain
  # 启动时是否检查 MyBatis XML 文件的存在，默认不检查
  checkConfigLocation: false
  configuration:
    # 自动驼峰命名规则（camel case）映射
    mapUnderscoreToCamelCase: true
    # MyBatis 自动映射策略
    # NONE：不启用 PARTIAL：只对非嵌套 resultMap 自动映射 FULL：对所有 resultMap 自动映射
    autoMappingBehavior: PARTIAL
    # MyBatis 自动映射时未知列或未知属性处理策
    # NONE：不做处理 WARNING：打印相关警告 FAILING：抛出异常和详细信息
    autoMappingUnknownColumnBehavior: NONE
    # 更详细的日志输出 会有性能损耗 org.apache.ibatis.logging.stdout.StdOutImpl
    # 关闭日志记录 (可单纯使用 p6spy 分析) org.apache.ibatis.logging.nologging.NoLoggingImpl
    # 默认日志输出 org.apache.ibatis.logging.slf4j.Slf4jImpl
    logImpl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    # 是否打印 Logo banner
    banner: true
    dbConfig:
      # 主键类型
      # AUTO 自增 NONE 空 INPUT 用户输入 ASSIGN_ID 雪花 ASSIGN_UUID 唯一 UUID
      idType: ASSIGN_ID
      # 逻辑已删除值
      logicDeleteValue: 1
      # 逻辑未删除值
      logicNotDeleteValue: 0
      # 字段验证策略之 insert,在 insert 的时候的字段验证策略
      # IGNORED 忽略 NOT_NULL 非NULL NOT_EMPTY 非空 DEFAULT 默认 NEVER 不加入 SQL
      insertStrategy: NOT_NULL
      # 字段验证策略之 update,在 update 的时候的字段验证策略
      updateStrategy: NOT_NULL
      # 字段验证策略之 select,在 select 的时候的字段验证策略既 wrapper 根据内部 entity 生成的 where 条件
      where-strategy: NOT_NULL

# 数据加密
mybatis-encryptor:
  # 是否开启加密
  enable: false
  # 默认加密算法
  algorithm: BASE64
  # 编码方式 BASE64/HEX。默认BASE64
  encode: BASE64
  # 安全秘钥 对称算法的秘钥 如：AES，SM4
  password:
  # 公私钥 非对称算法的公私钥 如：SM2，RSA
  publicKey:
  privateKey:

# Swagger配置
swagger:
  info:
    # 标题
    title: '标题：${ruoyi.name}后台管理系统_接口文档'
    # 描述
    #    description: '描述：用于管理集团旗下公司的人员信息,具体包括XXX,XXX模块...'
    # 版本
    version: '版本号: ${ruoyi-flowable-plus.version}'
    # 作者信息
    contact:
      name: leichaoqun
  #      email: 1527468660@qq.com
  #      url: https://gitee.com/KonBAI-Q/ruoyi-flowable-plus
  components:
    # 鉴权方式配置
    security-schemes:
      apiKey:
        type: APIKEY
        in: HEADER
        name: ${sa-token.token-name}

springdoc:
  #  pathMapping: jiaping
  api-docs:
    # 是否开启接口文档
    enabled: true
  #    path: ${SWAGGER_PRE:}/v3/api-docs
  swagger-ui:
    config-url: ../v3/api-docs/swagger-config
    url: ../v3/api-docs
    #    url: ../v3/api-docs/系统模块
    #    config-url: ${{SWAGGER_PRE:}/v3/api-docs/swagger-config
    #    url: ${SWAGGER_PRE:}/v3/api-docs/系统模块
    enabled: true
    # 持久化认证数据
    persistAuthorization: false
    operationsSorter: method
    docExpansion: none
    tagsSorter: alpha
  #这里定义了两个分组，可定义多个，也可以不定义
  group-configs:
    - group: 流程模块
      packages-to-scan: com.ruoyi.web.controller.workflow
    - group: 系统模块
      packages-to-scan: com.ruoyi.web.controller.system


knife4j:
  # 开启增强配置
  enable: true
  #开启生产环境屏蔽
  production: false
  basic:
    enable: false
    username: report
    password: wms1314


# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# 全局线程池相关配置
thread-pool:
  # 是否开启线程池
  enabled: false
  # 队列最大长度
  queueCapacity: 128
  # 线程池维护线程所允许的空闲时间
  keepAliveSeconds: 300

--- # 分布式锁 lock4j 全局配置
lock4j:
  # 获取分布式锁超时时间，默认为 3000 毫秒
  acquire-timeout: 3000
  # 分布式锁的超时时间，默认为 30 秒
  expire: 30000

--- # Actuator 监控端点的配置项
management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: ALWAYS
#    logfile:
#      external-file: ./logs/sys-console.log

--- # Flowable 配置
flowable:
  # 是否开启定时任务 job
  # async-executor-activate: 启用异步执行器，用于处理异步任务（如定时任务、异步延续、异步服务任务等）
  # 开启后会启动单独的线程池来处理异步任务，避免阻塞主流程
  async-executor-activate: true

  # job-executor-activate: 激活定时器执行器（已注释）
  # 用于处理流程中的定时器事件（如定时边界事件、定时启动事件等）
  # 注意：在较新版本的Flowable中，async-executor-activate已经包含了定时器执行的功能
  # 因此通常只需要开启async-executor-activate即可
#  job-executor-activate: true
  core-pool-size: 10
  max-pool-size: 50
  #定时任务执行间隔
  async-executor:
    timer-period: 30000          # 轮询间隔 30 秒
    max-timer-jobs-per-acquisition: 10  # 每次获取任务数
  # 库与数据库表结构不一致时，会自动将数据库表结构升级至新版本。
  database-schema-update: true
  idm:
    # 关闭idm引擎 数据库不会创建act_id_*表，流程流转不会使用act_id_*相关的表
    enabled: false
  # 关闭流程定义文件自动检查
  check-process-definitions: false
  # 是否启用历史任务数据异步处理
  async-history-executor-activate: true
  # 历史级别
  history-level: audit
