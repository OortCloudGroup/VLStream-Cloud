#blade configuration
blade:
  auth:
    #Obtained using @org.springblade.test.Sm2KeyGenerator, used for SM2 signature verification, needs to be consistent with the front-end
    public-key: ${BLADE_OAUTH2_PUBLIC_KEY}
    #Obtained using @org.springblade.test.Sm2KeyGenerator, used for SM2 decryption, front-end configuration not required
    private-key: ${BLADE_OAUTH2_PRIVATE_KEY}
  token:
    #Obtained using @org.springblade.test.SignKeyGenerator
    sign-key: ${BLADE_TOKEN_SIGN_KEY}
    #Obtained using @org.springblade.test.SignKeyGenerator
    aes-key: ${BLADE_TOKEN_CRYPTO_KEY}
  xss:
    enabled: true
    skip-url:
      - /blade-test/**
  secure:
    skip-url:
      - /blade-test/**
    client:
      - client-id: sword
        path-patterns:
          - /blade-sword/**
      - client-id: saber
        path-patterns:
          - /blade-saber/**
  tenant:
    column: tenant_id
    tables:
      - blade_notice

